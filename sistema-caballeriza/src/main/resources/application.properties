# Base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/caballeriza
spring.datasource.username=caballeriza_user
spring.datasource.password=caballeriza2026
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Datos semilla (data.sql) - se ejecuta despues de que Hibernate crea las tablas
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Servidor
server.port=8080

# JWT
jwt.secret=caballeriza2026SuperSecretKeyParaJWT512BitsMinimo!!XYZ123
jwt.expiration=86400000

# Subida de archivos (fotos de caballos)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:./uploads}

# Email (recuperacion de contraseña) - credenciales via variables de entorno
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# URL del frontend, usada para armar el enlace de recuperacion de contraseña
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logs
logging.level.com.caballeriza=DEBUG